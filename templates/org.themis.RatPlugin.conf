<!DOCTYPE busconfig PUBLIC
"-//freedesktop//DTD D-Bus Bus Configuration 1.0//EN"
"http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">

<busconfig>
    <policy user="root"> <!-- Intended usage -->
        <allow own="org.themis.RatPlugin"/>
        <allow send_destination="org.themis.RatPlugin"/>
        <allow receive_sender="org.themis.RatPlugin"/>
    </policy>
    <policy user="default">
        <allow send_destination="org.themis.RatPlugin"/>
    </policy>
</busconfig>
